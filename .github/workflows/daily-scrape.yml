name: Daily FX Scrape

on:
  # Stockholm 09:30 = 07:30 UTC in summer (CEST), 08:30 UTC in winter (CET).
  # GitHub Actions cron is UTC-only, so we trigger 07:30 UTC year-round.
  schedule:
    - cron: "00 11 * * *"

  # Lets you trigger the job manually from the Actions tab as well.
  workflow_dispatch:

# Allow the workflow's GITHUB_TOKEN to push CSVs back to the repo.
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scrapers (retry once after 15 min on failure)
        # main.py exits non-zero if ANY scraper fails. nick-invision/retry then
        # waits 15 minutes (900s) and runs it a second time. Two attempts total.
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 900
          command: python main.py

      - name: Commit and push new CSVs
        # Runs whether or not the scrape ultimately succeeded, so we still save
        # whatever data we did manage to collect. Remove if : always() if you only want to commit on full success.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Daily FX scrape: $(date -u +%Y-%m-%d %H:%M)"
          git push